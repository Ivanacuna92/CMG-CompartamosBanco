<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbursa - Bot</title>
  <link rel="stylesheet"  href="./assets/css/index.css" />
  <link rel="icon" type="image/jpeg" href="./assets/img/esaclogorr.jpeg" />
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <img src="./assets/img/esaclogo.jpeg" alt="Logo" class="logo">
    </div>
    
    <!-- Mensaje de bienvenida añadido -->
    <div class="welcome-message">
      <p>Más de 4 millones de mexicanos ya eligen ganar con Inbursa.</p>
    </div>
    
    <div class="chat-content">
      <div id="chatMessages" class="chat-messages">
        <div class="typing-indicator" id="typing-indicator">
          <div class="typing-indicator-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
      <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Ingresa tu respuesta..." autocomplete="off">
        <button id="sendBtn">
          <!-- Icono de enviar (flecha) -->
          <svg class="send-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    let userId = null;
    const chatMessages    = document.getElementById("chatMessages");
    const messageInput    = document.getElementById("messageInput");
    const sendBtn         = document.getElementById("sendBtn");
    const typingIndicator = document.getElementById("typing-indicator");

    function parseMarkdown(text) {
      text = text.replace(/\n\n/g, '</p><p>');
      text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
      text = text.replace(/\[([^\]]+)\]$$([^)]+)$$/g, '<a href="$2" class="chat-link" target="_blank">$1</a>');
      text = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" class="chat-link" target="_blank">$1</a>');
      text = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      text = text.replace(/\n/g, '<br>');
      return text;
    }

    function addMessage(text, sender) {
      const msgDiv = document.createElement("div");
      msgDiv.classList.add("message", sender);
      
      // Si es mensaje del bot, añadir avatar
      if (sender === "bot") {
        const avatar = document.createElement("img");
        avatar.src = "./assets/img/esaclogorr.jpeg"; // Usar la misma imagen del logo como avatar
        avatar.alt = "Bot Avatar";
        avatar.className = "bot-avatar";
        msgDiv.appendChild(avatar);
      }
      
      const bubble = document.createElement("div");
      bubble.classList.add("bubble");
      bubble.innerHTML = sender === "bot" ? parseMarkdown(text) : text;
      msgDiv.appendChild(bubble);
      chatMessages.insertBefore(msgDiv, typingIndicator);
      setTimeout(() => chatMessages.scrollTop = chatMessages.scrollHeight, 10);
    }

    function addInteractive(inter) {
      messageInput.disabled = true;
      sendBtn.disabled = true;
      const msgDiv = document.createElement("div");
      msgDiv.classList.add("message", "bot");
      
      // Añadir avatar para el bot
      const avatar = document.createElement("img");
      avatar.src = "./assets/img/favicon.png"; // Usar la misma imagen del logo como avatar
      avatar.alt = "Bot Avatar";
      avatar.className = "bot-avatar";
      msgDiv.appendChild(avatar);
      
      const bubble = document.createElement("div"); 
      bubble.classList.add("bubble");
      bubble.innerHTML = parseMarkdown(inter.interactive.body.text);
      
      // Crear contenedor de botones dentro de la burbuja
      const btnRow = document.createElement("div");
      btnRow.className = "auth-container";
      
      inter.interactive.action.buttons.forEach(b => {
        const btn = document.createElement("button");
        btn.textContent = b.reply.title;
        btn.className = "auth-button";
        btn.onclick = () => {
          btnRow.querySelectorAll('button').forEach(x => x.disabled = true);
          addMessage(b.reply.title, "user");
          sendMessage(b.reply.id).then(handleBotReply);
        };
        btnRow.appendChild(btn);
      });
      
      // Añadir los botones dentro de la burbuja
      bubble.appendChild(btnRow);
      msgDiv.appendChild(bubble);
      
      chatMessages.insertBefore(msgDiv, typingIndicator);
      setTimeout(() => chatMessages.scrollTop = chatMessages.scrollHeight, 10);
    }

    function handleBotReply(data) {
      typingIndicator.style.display = "none";
      if (data && typeof data === "object" && data.type === "interactive") {
        addInteractive(data);
      } else {
        addMessage(data, "bot");
        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    async function sendMessage(msg) {
      typingIndicator.style.display = "block";
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId, message: msg })
      });
      const json = await res.json();
      userId = json.userId;
      return json.response;
    }

    // On page load: fetch initial greeting
    window.addEventListener("DOMContentLoaded", async () => {
      messageInput.disabled = true;
      sendBtn.disabled = true;
      try {
        const res = await fetch("/new", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId })
        });
        const data = await res.json();
        userId = data.userId;
        addMessage(data.response, "bot");
      } catch {
        addMessage("Lo siento, no pude iniciar la conversación.", "bot");
      } finally {
        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.focus();
      }
    });

    sendBtn.addEventListener("click", async () => {
      const text = messageInput.value.trim();
      if (!text) return;
      addMessage(text, "user");
      messageInput.value = "";
      messageInput.disabled = true;
      sendBtn.disabled = true;
      try {
        const reply = await sendMessage(text);
        handleBotReply(reply);
      } catch {
        handleBotReply("Lo siento, ocurrió un error. Intenta de nuevo.");
      }
    });

    messageInput.addEventListener("keypress", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendBtn.click();
      }
    });

    new MutationObserver(() => {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }).observe(chatMessages, { childList: true, subtree: true });
  </script>
</body>
</html>
